# Play Framework 3.0 Configuration
# https://www.playframework.com/documentation/3.0.x/Configuration

play.http.secret.key = "changeme-generate-a-real-secret-for-production"

# Database Configuration (Supabase PostgreSQL direct connection)
# Set these via environment variables:
#   SUPABASE_DB_HOST, SUPABASE_DB_PASSWORD
db.default.driver = org.postgresql.Driver
db.default.url = "jdbc:postgresql://"${?SUPABASE_DB_HOST}":6543/postgres?prepareThreshold=0"
db.default.username = "postgres."${?SUPABASE_PROJECT_REF}
db.default.password = ${?SUPABASE_DB_PASSWORD}
db.default.hikaricp.connectionTestQuery = "SELECT 1"

# Connection pool
db.default.hikaricp.minimumIdle = 2
db.default.hikaricp.maximumPoolSize = 5

# Ebean ORM
ebean.default = ["models.*"]

# Play Filters
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = ["http://localhost:3000", "https://obott9.github.io"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Origin"]
}

# Disable evolutions (tables already exist in Supabase)
play.evolutions.enabled = false

# JSON serialization
play.http.parser.maxMemoryBuffer = 256K
